    <style>
      .c-loader {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        z-index: 850;
        pointer-events: none;
      }
      .c-loader:before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 5;
        background-color: #1d1d1d;
        opacity: 0;
        transition: opacity 0.6s cubic-bezier(0.215, 0.61, 0.355, 1);
      }
      html:not(.is-loaded) .c-loader {
        pointer-events: all;
      }
      html:not(.is-loaded) .c-loader:before {
        opacity: 0.8;
      }

      .c-loader_col {
        position: relative;
        z-index: 10;
        background-color: #000000;
        height: 100%;
        transform: scale3d(1, 0, 1);
        transition: transform 0.3s cubic-bezier(0.215, 0.61, 0.355, 1);
        transform-origin: center bottom;
      }
      html:not(.is-loaded) .c-loader_col {
        transform: scale3d(1, 1, 1);
        transform-origin: center top;
      }
      @media (min-width: 1000px) {
        .c-loader_col {
          width: calc((100vw - 13.125rem) * 4 / 20 + 2.5rem + 2px);
          margin-left: -1px;
        }
        .c-loader_col:nth-child(3) {
          width: calc((100vw - 13.125rem) * 6 / 20 + 3.75rem + 2px);
        }
        .c-loader_col:nth-child(4) {
          width: calc((100vw - 13.125rem) * 3 / 20 + 1.875rem + 2px);
        }
        .c-loader_col:nth-child(5) {
          width: calc((100vw - 13.125rem) * 3 / 20 + 2.5rem + 2px);
        }
        .c-loader_col:nth-child(5) {
          transition-delay: 0.075s;
        }
        .c-loader_col:nth-child(4) {
          transition-delay: 0.12s;
        }
        .c-loader_col:nth-child(3) {
          transition-delay: 0.165s;
        }
        .c-loader_col:nth-child(2) {
          transition-delay: 0.21s;
        }
        .c-loader_col:nth-child(1) {
          transition-delay: 0.255s;
        }
      }
      @media (max-width: 999px) {
        .c-loader_col {
          width: 33.3333333333%;
          width: 33.3333333333%;
          width: 33.3333333333%;
        }
        .c-loader_col:nth-child(2) {
          transition-delay: 0.075s;
        }
        .c-loader_col:nth-child(1) {
          transition-delay: 0.12s;
        }
        .c-loader_col:nth-child(0) {
          transition-delay: 0.165s;
        }
      }

      .c-loader_spinner {
        position: absolute;
        bottom: 0.625rem;
        right: 0.625rem;
        width: 3.125rem;
        height: 1.7578125rem;
        display: flex;
        transform: scaleY(0);
        transform-origin: center bottom;
        transition: transform 0.3s cubic-bezier(0.215, 0.61, 0.355, 1);
        z-index: 20;
      }
      html:not(.is-loaded) .c-loader_spinner {
        transform: scaleY(1);
        transition-delay: 0.3s;
      }
      .c-loader_spinner div {
        flex-grow: 1;
        background-color: #ffffff;
        animation: loaderSpinnerCol 1s cubic-bezier(0.215, 0.61, 0.355, 1)
          infinite;
        margin-left: -1px;
      }
      .c-loader_spinner div:nth-child(1) {
        animation-delay: -0.1s;
      }
      .c-loader_spinner div:nth-child(2) {
        animation-delay: -0.2s;
      }
      .c-loader_spinner div:nth-child(3) {
        animation-delay: -0.3s;
      }
      .c-loader_spinner div:nth-child(4) {
        animation-delay: -0.4s;
      }

      @keyframes loaderSpinnerCol {
        0% {
          transform: scale3d(1, 0.25, 1);
          transform-origin: bottom center;
        }
        50% {
          transform: scale3d(1, 1, 1);
          transform-origin: bottom center;
        }
        100% {
          transform: scale3d(1, 0.25, 1);
          transform-origin: bottom center;
        }
      }
      #initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      /* paste your existing .c-loader spinner CSS here too */

      /* Nav */
      #html-loader-nav {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        padding: 8px;
        z-index: 999999;
      }

      /* SVG Logo */
      #html-loader-nav svg {
        cursor: pointer;
        height: 44.5px;
        font-weight: 500;
        font-family: "lausanne2", sans-serif;
        transition: fill 900ms ease-in-out;
      }

      @media (min-width: 768px) {
        #html-loader-nav svg {
          font-size: 15px;
        }
      }

      @media (min-width: 1280px) {
        #html-loader-nav {
          padding: 10px;
        }
        #html-loader-nav svg {
          font-size: 16px;
          height: 48px;
        }
      }

      @media (min-width: 1536px) {
        #html-loader-nav svg {
          height: 60px;
        }
      }
    </style>
